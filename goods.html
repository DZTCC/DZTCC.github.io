      /* 导航栏logo和第一个tab之间增加间距 */

        width: 48px;

      .product-name-cell {
        min-width: 160px;

      }
      /* 数据列样式 */
      .data-cell {
        min-width: 50px;
        padding-left: 0.5rem !important;
        padding-right: 0.5rem !important;
      }
      /* 数据单元格内容 */
      .data-content {
        display: inline-block;

        line-height: 1.2;
      }
      /* 小字占比样式 */
      .ratio-text {
        font-size: 0.7rem;
        color: #6c757d;
        margin-top: 0.1rem;
      }
      /* 表格排序图标 */
      .sortable {
        cursor: pointer;
        user-select: none;
      }
      .sortable:hover {
        background-color: rgba(0, 0, 0, 0.02);
      }
      .sort-icon {
        opacity: 0.3;
        margin-left: 0.25rem;
      }
      .sortable.asc .sort-icon,
      .sortable.desc .sort-icon {
        opacity: 1;
      }
      /* 商品名列（最重要，给最大空间） */
      th.product-name-cell {
        width: 18%;
      }
      /* 平台数据列 */
      th[data-column="tmall"] {
        width: 8%;
      }

      th[data-column="douyin"] {
        width: 8%;
      }

      th[data-column="jd"] {
        width: 8%;

      th[data-column="xiaohongshu"] {

      th[data-column="others"] {
        width: 8%;

      th[data-column="inventory"] {

      /* 运营指标 */

        width: 6%;
      }

      th[data-column="shelf_ratio"] {

      let currentMode = 'quantity'; // 'quantity' or 'amount'
      let currentSort = { column: null, direction: null };
      
      // 渲染表格
      function renderTable(data, mode) {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';
        
        data.forEach((product, index) => {
          const modeData = product[mode];
          const total = modeData.total;
          
          const row = document.createElement('tr');
          row.innerHTML = `
            <td class="product-name-cell">
              <div class="d-flex align-items-center">
                <img src="${product.image}" alt="${product.name}" class="product-img me-2">
                <div>${product.name}</div>
              </div>
            </td>
            <td class="data-cell">
              <div class="data-content">
                <div>${formatNumber(modeData.tmall, mode)}</div>
                <div class="ratio-text">${((modeData.tmall / total) * 100).toFixed(1)}%</div>
              </div>
            </td>
            <td class="data-cell">
              <div class="data-content">
                <div>${formatNumber(modeData.douyin, mode)}</div>
                <div class="ratio-text">${((modeData.douyin / total) * 100).toFixed(1)}%</div>
              </div>
            </td>
            <td class="data-cell">
              <div class="data-content">
                <div>${formatNumber(modeData.jd, mode)}</div>
                <div class="ratio-text">${((modeData.jd / total) * 100).toFixed(1)}%</div>
              </div>
            </td>
            <td class="data-cell">
              <div class="data-content">
                <div>${formatNumber(modeData.xiaohongshu, mode)}</div>
                <div class="ratio-text">${((modeData.xiaohongshu / total) * 100).toFixed(1)}%</div>
              </div>
            </td>
            <td class="data-cell">
              <div class="data-content">
                <div>${formatNumber(modeData.others, mode)}</div>
                <div class="ratio-text">${((modeData.others / total) * 100).toFixed(1)}%</div>
              </div>
            </td>
            <td class="data-cell"><strong>${formatNumber(total, mode)}</strong></td>
            <td class="data-cell">${formatInventory(modeData.inventory, mode)}</td>
            <td class="data-cell">${modeData.turnover_days}天</td>
            <td class="data-cell">
              <div class="data-content">
                <div>${formatNumber(modeData.return, mode)}</div>
                <div class="ratio-text">${((modeData.return / total) * 100).toFixed(1)}%</div>
              </div>
            </td>
            <td class="data-cell">${modeData.shelf_ratio}%</td>
            <td class="data-cell">${modeData.content_ratio}%</td>
          `;
          tbody.appendChild(row);
        });
      }
      
      // 格式化数字
      function formatNumber(value, mode) {
        if (mode === 'amount') {
          return '¥' + value.toLocaleString('zh-CN');
        }
        return value.toLocaleString('zh-CN');
      }
      
      // 格式化库存（金额模式显示万元）
      function formatInventory(value, mode) {
        if (mode === 'amount') {
          return '¥' + Math.round(value / 10000) + '万';
        }
        return value.toLocaleString('zh-CN');
      }
      
      // 排序功能
      function sortTable(column) {
        let direction = 'asc';
        
        if (currentSort.column === column) {
          if (currentSort.direction === 'asc') {
            direction = 'desc';
          } else if (currentSort.direction === 'desc') {
            direction = null;
          }
        }
        
        // 更新排序状态
        currentSort = { column, direction };
        
        // 更新UI
        document.querySelectorAll('.sortable').forEach(th => {
          th.classList.remove('asc', 'desc');
        });
        
        if (direction) {
          const th = document.querySelector(`[data-column="${column}"]`);
          th.classList.add(direction);
        }
        
        // 排序数据
        let sortedData = [...productsData];
        if (direction) {
          sortedData.sort((a, b) => {
            const aVal = a[currentMode][column];
            const bVal = b[currentMode][column];
            return direction === 'asc' ? aVal - bVal : bVal - aVal;
          });
        }
        
        renderTable(sortedData, currentMode);
      }
      
      // 初始化
      document.addEventListener('DOMContentLoaded', function() {
        renderTable(productsData, currentMode);
        
        // 维度切换
        document.querySelectorAll('[data-mode]').forEach(item => {
          item.addEventListener('click', function(e) {
            e.preventDefault();
            const mode = this.getAttribute('data-mode');
            currentMode = mode;
            
            // 更新active状态
            document.querySelectorAll('[data-mode]').forEach(el => el.classList.remove('active'));
            this.classList.add('active');
            
            // 重新渲染表格
            renderTable(productsData, currentMode);
          });
        });
        
        // 排序事件
        document.querySelectorAll('.sortable').forEach(th => {
          th.addEventListener('click', function() {
            const column = this.getAttribute('data-column');
            sortTable(column);
          });
        });
      });
    </script>
