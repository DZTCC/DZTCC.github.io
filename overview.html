                          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon ms-1 icon-2">

            <!-- 图表区域 -->

                    <div class="d-flex mb-1">

                      <div class="ms-auto">

                          <a class="dropdown-toggle text-secondary" id="sales-trend-dropdown" href="#" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false" aria-label="选择时间范围">近30天</a>
                          <div class="dropdown-menu dropdown-menu-end" aria-labelledby="sales-trend-dropdown">
                            <a class="dropdown-item active" href="#" aria-current="true" data-period="30">近30天</a>
                            <a class="dropdown-item" href="#" data-period="365">近1年</a>

                    <div class="row">
                      <div class="col-auto" style="flex: 1; min-width: 0;">
                        <div id="chart-sales-trend" style="min-height: 288px;"></div>
                      </div>
                      <div class="col-auto" style="width: 85px;">
                        <div class="divide-y divide-y-fill">
                          <div class="px-2">
                            <div class="text-secondary"><span class="status-dot bg-primary"></span> 现期</div>
                            <div class="h3" id="stat-current-year" style="white-space: nowrap;" data-30d="297.4万" data-365d="3452万">297.4万</div>
                          </div>
                          <div class="px-2">
                            <div class="text-secondary"><span class="status-dot" style="background-color: #d0d0d0;"></span> 基期</div>
                            <div class="h3" id="stat-last-year" style="white-space: nowrap;" data-30d="153.2万" data-365d="2706万">153.2万</div>

    <!-- Libs JS -->
    <script src="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/js/tabler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script>
      // 从模板注入的数据
      const chartData = {
        salesTrend: {
          data30Days: {
            dates: ["1/26", "1/27", "1/28", "1/29", "1/30", "1/31", "2/1", "2/2", "2/3", "2/4", "2/5", "2/6", "2/7", "2/8", "2/9", "2/10", "2/11", "2/12", "2/13", "2/14", "2/15", "2/16", "2/17", "2/18", "2/19", "2/20", "2/21", "2/22", "2/23", "2/24"],
            currentYear: [91717, 115065, 175427, 122115, 130488, 164847, 123452, 112865, 125016, 126402, 129762, 127601, 159164, 167833, 126126, 126129, 135963, 133869, 88878, 78080, 56674, 39561, 28626, 40143, 40771, 35685, 43400, 39557, 42820, 46157],
            lastYear: [88956, 53929, 42140, 19403, 25574, 26791, 24430, 29339, 34685, 32915, 34678, 39478, 55815, 88072, 59355, 52656, 68145, 84698, 71496, 94309, 75218, 43692, 34138, 63242, 59139, 49717, 45280, 52161, 41814, 40724]
          },
          data365Days: {
            dates: ["25/3", "25/4", "25/5", "25/6", "25/7", "25/8", "25/9", "25/10", "25/11", "25/12", "26/1", "26/2"],
            currentYear: [2482737, 2362899, 3229168, 2216291, 3024153, 3211016, 2475738, 3427198, 2767753, 3446349, 3116289, 2762111],
            lastYear: [1699132, 1300659, 3956061, 2142550, 2006586, 1927834, 2011914, 2270847, 2403076, 2929761, 2718004, 1696988]
          }
        },
        channelDistribution: {
          labels: ["\u5929\u732b", "\u6296\u97f3", "\u4eac\u4e1c", "\u5c0f\u7ea2\u4e66", "\u5176\u4ed6"],
          values: [39.8, 19.5, 32.1, 6.7, 1.9]
        }
      };
      
      // 图表配置
      const chartOptions = {
        series: [{
          name: '现期',
          data: chartData.salesTrend.data30Days.currentYear
        }, {
          name: '基期',
          data: chartData.salesTrend.data30Days.lastYear
        }],
        chart: {
          type: 'line',
          height: 288,
          fontFamily: 'inherit',
          parentHeightOffset: 0,
          toolbar: {
            show: false
          },
          animations: {
            enabled: true
          },
          zoom: {
            enabled: false
          }
        },
        colors: ['#f59f00', '#d0d0d0'],
        stroke: {
          width: 2,
          curve: 'smooth'
        },
        grid: {
          strokeDashArray: 4,
          padding: {
            top: -20,
            right: -1,
            left: 10,
            bottom: -4
          },
          xaxis: {
            lines: {
              show: false
            }
          }
        },
        xaxis: {
          categories: chartData.salesTrend.data30Days.dates,
          labels: {
            style: {
              colors: '#373d3f',
              fontSize: '11px'
            },
            rotate: 0,
            hideOverlappingLabels: true,
            showDuplicates: false
          },
          tickAmount: 15,
          axisBorder: {
            show: true,
            color: '#e0e0e0'
          },
          axisTicks: {
            show: true
          }
        },
        yaxis: {
          labels: {
            style: {
              colors: '#373d3f',
              fontSize: '11px'
            },
            formatter: function(value) {
              return (value / 10000).toFixed(0) + '万';}
          }
        },
        legend: {
          show: false
        },
        tooltip: {
          theme: 'dark',
          y: {
            formatter: function(value) {
              return value.toLocaleString('zh-CN');
            }
          }
        }
      };
      
      // 渲染图表
      document.addEventListener('DOMContentLoaded', function() {
        const chart = new ApexCharts(document.querySelector("#chart-sales-trend"), chartOptions);
        chart.render();
        
        // 下拉菜单切换事件
        document.querySelectorAll('[data-period]').forEach(item => {
          item.addEventListener('click', function(e) {
            e.preventDefault();
            const period = parseInt(this.getAttribute('data-period'));
            
            // 更新active状态
            document.querySelectorAll('[data-period]').forEach(el => el.classList.remove('active'));
            this.classList.add('active');
            
            // 更新下拉按钮文本
            const dropdownToggle = this.closest('.dropdown').querySelector('.dropdown-toggle');
            dropdownToggle.textContent = this.textContent;
            
            // 根据period选择数据
            const data = period === 30 ? chartData.salesTrend.data30Days : chartData.salesTrend.data365Days;
            
            // 更新统计数字
            const currentYearEl = document.getElementById('stat-current-year');
            const lastYearEl = document.getElementById('stat-last-year');
            if (period === 30) {
              currentYearEl.textContent = currentYearEl.getAttribute('data-30d');
              lastYearEl.textContent = lastYearEl.getAttribute('data-30d');
            } else {
              currentYearEl.textContent = currentYearEl.getAttribute('data-365d');
              lastYearEl.textContent = lastYearEl.getAttribute('data-365d');
            }
            
            // 更新图表数据
            chart.updateOptions({
              xaxis: {
                categories: data.dates,
                labels: {
                  style: {
                    colors: '#373d3f',
                    fontSize: '11px'
                  },
                  rotate: 0,
                  hideOverlappingLabels: true,
                  showDuplicates: false
                },
                tickAmount: period === 30 ? 15 : undefined,
                axisBorder: {
                  show: true,
                  color: '#e0e0e0'
                },
                axisTicks: {
                  show: true
                }
              }
            });
            chart.updateSeries([{
              name: '现期',
              data: data.currentYear
            }, {
              name: '基期',
              data: data.lastYear
            }]);
          });
        });
        
        // 渲染饼图
        window.ApexCharts && (new ApexCharts(document.getElementById('chart-channel-distribution'), {
          chart: {
            type: "donut",
            fontFamily: 'inherit',
            height: 290,
            sparkline: {
              enabled: false
            },
            animations: {
              enabled: false
            },
            offsetY: 10
          },
          series: chartData.channelDistribution.values,
          labels: chartData.channelDistribution.labels,
          tooltip: {
            theme: 'dark'
          },
          grid: {
            strokeDashArray: 4,
          },
          colors: ['#f59f00', '#fdb44d', '#fec980', '#fedeb3', '#d0d0d0'],
          plotOptions: {
            pie: {
              donut: {
                size: '65%'
              }
            }
          },
          dataLabels: {
            enabled: false
          },
          legend: {
            show: true,
            position: 'bottom',
            offsetY: 12,
            markers: {
              width: 10,
              height: 10,
              radius: 100,
            },
            itemMargin: {
              horizontal: 8,
              vertical: 4
            },
          },
          tooltip: {
            fillSeriesColor: false
          },
        })).render();
      });
    </script>
  </body>
