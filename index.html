<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8"/>
    <meta http-equiv="refresh" content="0; url=overview.html">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
    <title>数据报表 - INJOY</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #f5f7fb;
      }
      .loading {
        text-align: center;
      }
      .loading h1 {
        color: #f59f00;
        font-size: 2rem;
        margin-bottom: 1rem;
      }
      .loading p {
        color: #6c757d;
        font-size: 1rem;
      }
      .spinner {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #f59f00;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="loading">
      <h1>INJOY 数据报表</h1>
      <div class="spinner"></div>
      <p>正在跳转到总览页面...</p>
      <p><a href="overview.html" style="color: #f59f00; text-decoration: none;">如果没有自动跳转，请点击这里</a></p>
    </div>
    <script>
      // 立即跳转到总览页面
      window.location.href = 'overview.html';
    </script>
  </body>
</html>
